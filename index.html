    <!-- === Left Panel: Advanced Live Map === -->
    <div class="w-full md:w-2/3 h-[600px] md:h-auto bg-slate-900/50 backdrop-blur-2xl border border-white/10 rounded-3xl relative overflow-hidden flex items-center justify-center shadow-2xl">
        
        <!-- Map Grid Background Texture -->
        <div class="absolute inset-0 opacity-[0.03] pointer-events-none" style="background-image: linear-gradient(#fff 1px, transparent 1px), linear-gradient(90deg, #fff 1px, transparent 1px); background-size: 20px 20px;"></div>

        <!-- Glowing Tracks -->
        <svg class="absolute inset-0 w-full h-full" style="z-index: 0;">

            <line x1="30%" y1="65%" x2="50%" y2="86%" stroke="rgba(255,255,255,0.15)" stroke-width="6" stroke-linecap="round" />
            <line x1="30%" y1="65%" x2="50%" y2="86%" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-dasharray="10 15" stroke-linecap="round" />
            <line x1="70%" y1="65%" x2="50%" y2="86%" stroke="rgba(255,255,255,0.15)" stroke-width="6" stroke-linecap="round" />
            <line x1="70%" y1="65%" x2="50%" y2="86%" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-dasharray="10 15" stroke-linecap="round" />
        </svg>

        <!-- The Terminal Hub -->
        <div class="absolute left-[15%] right-[15%] top-[72%] bottom-[4%] bg-slate-950/80 backdrop-blur-md border border-slate-700/80 rounded-2xl flex flex-col items-center justify-start pt-3 z-0 shadow-2xl">
            <h3 class="text-slate-100 font-bold text-xs tracking-wider mb-2 px-6 py-1.5 bg-slate-800 rounded-full border border-slate-600 shadow-lg">

                <div class="border border-emerald-500/50 bg-emerald-950/30 w-20 h-20 rounded-lg flex items-end justify-center pb-2 text-[11px] text-emerald-400 font-bold relative shadow-[inset_0_0_20px_rgba(16,185,129,0.1)]">
                    موقف العيايشة
                </div>
                <div class="border border-dashed border-slate-600/50 bg-slate-900/50 w-16 h-20 rounded-lg flex items-end justify-center pb-2 text-[10px] text-slate-500">P3</div>

        <!-- Regular Stops Container -->
        <div id="stopsContainer"></div>

    <script>
        // === Core Configuration ===
        const START_TIME_MINUTES = 6 * 60 + 30; // 06:30 AM
        const END_TIME_MINUTES = 19 * 60; // 19:00 PM
        const CYCLE_DURATION = 90;

        const BUSES = [
            { id: 1, name: 'حافلة 1', offset: 0, color: 'bg-emerald-500', glow: 'shadow-[0_0_20px_rgba(16,185,129,0.6)]', text: 'text-emerald-400' },
            { id: 2, name: 'حافلة 2', offset: 30, color: 'bg-blue-500', glow: 'shadow-[0_0_20px_rgba(59,130,246,0.6)]', text: 'text-blue-400' },
            { id: 3, name: 'حافلة 3', offset: 60, color: 'bg-purple-500', glow: 'shadow-[0_0_20px_rgba(168,85,247,0.6)]', text: 'text-purple-400' }
        ];

        const ROUTE_STEPS = [
            { id: 's1_out', name: 'العيايشة', x: 30, y: 15, wait: 5, move: 10, nextX: 30, nextY: 40 },
            { id: 's2_out', name: 'وسط قاوس', x: 30, y: 40, wait: 5, move: 10, nextX: 30, nextY: 65 },
            { id: 's3_in_term', name: 'دخول المحطة', x: 30, y: 65, wait: 0, move: 2, nextX: 50, nextY: 86 },
            { id: 'terminal', name: 'محطة جيجل', x: 50, y: 86, wait: 10, move: 3, nextX: 70, nextY: 65 }, 
            { id: 's3_inbound', name: 'خروج من المحطة', x: 70, y: 65, wait: 0, move: 10, nextX: 70, nextY: 40 },
            { id: 's2_in', name: 'وسط قاوس (عودة)', x: 70, y: 40, wait: 5, move: 10, nextX: 70, nextY: 15 },
            { id: 's1_in', name: 'العيايشة (عودة)', x: 70, y: 15, wait: 5, move: 10, nextX: 30, nextY: 15 },
            { id: 's1_buffer', name: 'استراحة', x: 30, y: 15, wait: 5, move: 0, nextX: 30, nextY: 15 }
        ];

        const STOPS = [
            { id: 's1', name: 'العيايشة', y: 15 },
            { id: 's2', name: 'وسط قاوس (Kaous Center)', y: 40 }
        ];

        // === State ===
        let state = {
            simulatedTime: new Date(),
            timeMultiplier: 1,
            isPlaying: true,
            isLiveMode: true,
            selectedBusId: null,
            intervalId: null
        };

        // === Data Logic ===
        function getBusData(busOffset, busId) {
            const currentMinutes = state.simulatedTime.getHours() * 60 + state.simulatedTime.getMinutes() + state.simulatedTime.getSeconds() / 60;
            const diff = currentMinutes - START_TIME_MINUTES - busOffset;

            if (diff < 0) return { status: 'في المرآب (ينتظر الانطلاق)', x: 30 + (busId * 2), y: 10, isMoving: false, rotation: 180, isParked: true, countdown: null, progress: 0 };

            const maxAllowedActiveTime = END_TIME_MINUTES - START_TIME_MINUTES - busOffset;
            const busEndOfShiftActiveTime = Math.floor(maxAllowedActiveTime / CYCLE_DURATION) * CYCLE_DURATION;

            if (diff >= busEndOfShiftActiveTime) {
                return { status: 'انتهاء الوردية (المرآب)', x: 30 + (busId * 2), y: 10, isMoving: false, rotation: 180, isParked: true, countdown: null, progress: 100 };
            }

            const cycleTime = diff % CYCLE_DURATION;
            const progress = (cycleTime / CYCLE_DURATION) * 100;
            
            let accumulatedTime = 0;
            let currentStep = ROUTE_STEPS[0];
            let timeInStep = 0;

            for (let i = 0; i < ROUTE_STEPS.length; i++) {
                const step = ROUTE_STEPS[i];
                const stepDuration = step.wait + step.move;
                if (cycleTime < accumulatedTime + stepDuration) {
                    currentStep = step;
                    timeInStep = cycleTime - accumulatedTime;
                    break;
                }
                accumulatedTime += stepDuration;
            }

            let fraction = 0;
            let isMoving = false;
            let status = `${currentStep.name} - انتظار`;
            let countdown = null;

            if (timeInStep < currentStep.wait) {
                isMoving = false;
                if (currentStep.id === 'terminal') {
                    status = 'محطة جيجل - انتظار للعودة';
                    const remMinutes = currentStep.wait - timeInStep;
                    const m = Math.floor(remMinutes);
                    const s = Math.floor((remMinutes - m) * 60);
                    countdown = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                } else {
                    status = `${currentStep.name} - ركوب/نزول`;
                }
            } else {
                isMoving = true;
                const moveTime = timeInStep - currentStep.wait;
                fraction = moveTime / currentStep.move;
                const nextStepIndex = (ROUTE_STEPS.indexOf(currentStep) + 1) % ROUTE_STEPS.length;
                status = `متجه إلى ${ROUTE_STEPS[nextStepIndex].name}`;
            }

            const x = currentStep.x + (currentStep.nextX - currentStep.x) * fraction;
            const y = currentStep.y + (currentStep.nextY - currentStep.y) * fraction;

            let rotation = 0;
            if (isMoving) {
                const angle = Math.atan2(currentStep.nextY - currentStep.y, currentStep.nextX - currentStep.x) * (180 / Math.PI);
                rotation = angle + 90; 
            } else {
                if (currentStep.id === 'terminal') rotation = 180; 
                else if (currentStep.x < 50) rotation = 180; 
                else rotation = 0; 
            }

            return { status, x, y, isMoving, rotation, isParked: false, countdown, progress };
        }

        function formatTime(date) {
            return date.toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        // === UI Building & Updating ===
        function initDOM() {
            // Build Stops
            const stopsContainer = document.getElementById('stopsContainer');
            STOPS.forEach(stop => {
                stopsContainer.innerHTML += `
                    <div class="absolute w-5 h-5 rounded-full bg-slate-800 border-4 border-slate-400 z-10 shadow-lg" style="left: 30%; top: ${stop.y}%; transform: translate(-50%, -50%)">
                        <div class="absolute right-8 top-1/2 -translate-y-1/2 whitespace-nowrap text-xs text-white font-medium bg-slate-800/90 backdrop-blur border border-slate-600 px-3 py-1.5 rounded-lg shadow-xl">
                            ${stop.name} <span class="text-slate-400 text-[10px] ml-1">(ذهاب)</span>
                        </div>
                    </div>
                    <div class="absolute w-5 h-5 rounded-full bg-slate-800 border-4 border-slate-400 z-10 shadow-lg" style="left: 70%; top: ${stop.y}%; transform: translate(-50%, -50%)">
                        <div class="absolute left-8 top-1/2 -translate-y-1/2 whitespace-nowrap text-xs text-white font-medium bg-slate-800/90 backdrop-blur border border-slate-600 px-3 py-1.5 rounded-lg shadow-xl">
                            ${stop.name} <span class="text-slate-400 text-[10px] mr-1">(عودة)</span>
                        </div>
                    </div>
                `;
            });

            // Build Buses
            const listContainer = document.getElementById('busListContainer');
            const mapContainer = document.getElementById('mapBusesContainer');

            BUSES.forEach(bus => {
                // List Item
                listContainer.innerHTML += `
                    <div onclick="openModal(${bus.id})" class="bg-white/5 backdrop-blur-md border border-white/10 hover:border-white/20 rounded-2xl p-4 flex items-center gap-4 transition-all cursor-pointer group">
                        <div id="list-icon-bg-${bus.id}" class="p-3 rounded-xl relative transition-transform group-hover:scale-110">
                            <i data-lucide="bus" id="list-icon-${bus.id}" class="w-5 h-5"></i>
                        </div>
                        <div class="flex-1">
                            <h3 class="font-bold text-slate-100">${bus.name}</h3>
                            <div class="flex justify-between items-center mt-1">
                                <p id="list-status-${bus.id}" class="text-xs font-medium truncate max-w-[180px]"></p>
                            </div>
                        </div>
                        <div class="flex items-center justify-center w-8 h-8 rounded-full bg-slate-800/50 group-hover:bg-slate-700/50 transition-colors">
                            <i data-lucide="info" class="text-slate-400 w-4 h-4"></i>
                        </div>
                    </div>
                `;

                // Map Item
                mapContainer.innerHTML += `
                    <div onclick="openModal(${bus.id})" id="map-bus-container-${bus.id}" class="absolute z-20 cursor-pointer group bus-element">
                        <div id="map-icon-bg-${bus.id}" class="w-12 h-12 -ml-6 -mt-6 rounded-2xl border-2 flex items-center justify-center transition-transform group-hover:scale-125 group-hover:z-50">
                            <i data-lucide="bus" id="map-icon-${bus.id}" class="w-5 h-5 drop-shadow-md"></i>
                            <div id="map-name-${bus.id}" class="absolute -top-8 bg-slate-900/90 backdrop-blur text-[11px] px-2.5 py-1 rounded-md text-white font-bold whitespace-nowrap border border-slate-700 shadow-xl opacity-80 group-hover:opacity-100 transition-opacity">${bus.name}</div>
                        </div>
                        <div id="map-countdown-${bus.id}" class="hidden absolute -top-16 left-1/2 -translate-x-1/2 bg-red-600/90 backdrop-blur border border-red-400 text-white text-[11px] px-2 py-1 rounded-md font-mono animate-pulse shadow-[0_0_15px_rgba(220,38,38,0.5)] whitespace-nowrap pointer-events-none"></div>
                    </div>
                `;
            });

            lucide.createIcons();
            startEngine();
        }

        function updateUI() {
            // Main Clock
            document.getElementById('mainClock').innerText = formatTime(state.simulatedTime);

            BUSES.forEach(bus => {
                const data = getBusData(bus.offset, bus.id);

                // Update List Status
                document.getElementById(`list-status-${bus.id}`).innerText = data.status;
                
                // Update List Colors
                const listBg = document.getElementById(`list-icon-bg-${bus.id}`);
                const listIcon = document.getElementById(`list-icon-${bus.id}`);
                const listStatus = document.getElementById(`list-status-${bus.id}`);
                if(data.isParked) {
                    listBg.className = `p-3 rounded-xl relative transition-transform group-hover:scale-110 bg-slate-800`;
                    listIcon.classList.replace('text-white', 'text-slate-500');
                    listStatus.className = `text-xs font-medium truncate max-w-[180px] text-slate-500`;
                } else {
                    listBg.className = `p-3 rounded-xl relative transition-transform group-hover:scale-110 ${bus.color} ${bus.glow}`;
                    listIcon.classList.replace('text-slate-500', 'text-white');
                    listStatus.className = `text-xs font-medium truncate max-w-[180px] text-slate-300`;
                }

                // Update Map Positioning
                const mapContainer = document.getElementById(`map-bus-container-${bus.id}`);
                mapContainer.style.left = `${data.x}%`;
                mapContainer.style.top = `${data.y}%`;

                // Update Map Icon Rotation & Colors
                const mapBg = document.getElementById(`map-icon-bg-${bus.id}`);
                const mapName = document.getElementById(`map-name-${bus.id}`);
                const mapIcon = document.getElementById(`map-icon-${bus.id}`);
                
                mapBg.style.transform = `rotate(${data.rotation}deg)`;
                mapName.style.transform = `rotate(-${data.rotation}deg)`;

                if(data.isParked) {
                    mapBg.className = `w-12 h-12 -ml-6 -mt-6 rounded-2xl border-2 flex items-center justify-center transition-transform group-hover:scale-125 group-hover:z-50 bg-slate-700 border-slate-500`;
                    mapIcon.classList.replace('text-white', 'text-slate-400');
                } else {
                    mapBg.className = `w-12 h-12 -ml-6 -mt-6 rounded-2xl border-2 flex items-center justify-center transition-transform group-hover:scale-125 group-hover:z-50 border-white ${bus.color} ${bus.glow}`;
                    mapIcon.classList.replace('text-slate-400', 'text-white');
                }

                // Update Map Countdown
                const mapCountdown = document.getElementById(`map-countdown-${bus.id}`);
                if (data.countdown) {
                    mapCountdown.innerHTML = `⏳ ${data.countdown}`;
                    mapCountdown.classList.remove('hidden');
                } else {
                    mapCountdown.classList.add('hidden');
                }

                // Update Modal if this bus is selected
                if (state.selectedBusId === bus.id) {
                    document.getElementById('modalLiveStatus').innerText = data.status;
                    document.getElementById('modalProgressBar').style.width = `${data.progress}%`;
                    document.getElementById('modalProgressText').innerText = `${Math.round(data.progress)}% مكتمل`;
                    
                    const cdContainer = document.getElementById('modalCountdownContainer');
                    const cdText = document.getElementById('modalCountdownText');
                    if (data.countdown) {
                        cdText.innerText = `يغادر بعد ${data.countdown}`;
                        cdContainer.classList.remove('hidden');
                    } else {
                        cdContainer.classList.add('hidden');
                    }
                }
            });
        }

        // === Controls & Modal functions ===
        function startEngine() {
            if (state.intervalId) clearInterval(state.intervalId);
            
            if (!state.isPlaying) {
                updatePlayButton();
                return;
            }
            
            state.intervalId = setInterval(() => {
                if (state.isLiveMode) {
                    state.simulatedTime = new Date();
                } else {
                    state.simulatedTime = new Date(state.simulatedTime.getTime() + (50 * state.timeMultiplier));
                }
                updateUI();
            }, state.isLiveMode ? 1000 : 50);

            updatePlayButton();
            updateModeButtons();
        }

        function togglePlay() {
            state.isPlaying = !state.isPlaying;
            startEngine();
        }

        function setMode(isLive, multiplier) {
            state.isLiveMode = isLive;
            state.timeMultiplier = multiplier;
            state.isPlaying = true;
            startEngine();
            updateModeButtons();
        }

        function updatePlayButton() {
            const btn = document.getElementById('btnPlay');
            if (state.isPlaying) {
                btn.innerHTML = `<i data-lucide="pause" class="text-amber-400 w-5 h-5"></i>`;
            } else {
                btn.innerHTML = `<i data-lucide="play" class="text-emerald-400 w-5 h-5"></i>`;
            }
            lucide.createIcons();
        }

        function updateModeButtons() {
            const ind = document.getElementById('modeIndicator');
            ind.className = state.isLiveMode 
                ? 'flex items-center gap-2 text-xs px-3 py-1.5 rounded-full font-bold bg-emerald-500/20 text-emerald-400 border border-emerald-500/30'
                : 'flex items-center gap-2 text-xs px-3 py-1.5 rounded-full font-bold bg-slate-800 text-slate-400 border border-slate-700';
            ind.innerText = state.isLiveMode ? '📡 حي' : '⚙️ محاكاة';

            document.getElementById('btnSync').className = `px-4 py-3 rounded-xl text-sm font-bold transition-colors border ${state.isLiveMode ? 'bg-emerald-600/90 border-emerald-500 text-white shadow-[0_0_15px_rgba(16,185,129,0.4)]' : 'bg-slate-800/80 border-slate-600 text-slate-300 hover:bg-slate-700'}`;
            document.getElementById('btnX60').className = `px-4 py-3 rounded-xl text-sm font-bold flex items-center gap-1 transition-colors border ${!state.isLiveMode && state.timeMultiplier === 60 ? 'bg-blue-600/90 border-blue-500 text-white shadow-[0_0_15px_rgba(59,130,246,0.4)]' : 'bg-slate-800/80 border-slate-600 text-slate-300 hover:bg-slate-700'}`;
            document.getElementById('btnX600').className = `px-4 py-3 rounded-xl text-sm font-bold flex items-center gap-1 transition-colors border ${!state.isLiveMode && state.timeMultiplier === 600 ? 'bg-purple-600/90 border-purple-500 text-white shadow-[0_0_15px_rgba(168,85,247,0.4)]' : 'bg-slate-800/80 border-slate-600 text-slate-300 hover:bg-slate-700'}`;
        }

        function openModal(busId) {
            state.selectedBusId = busId;
            const bus = BUSES.find(b => b.id === busId);
            const data = getBusData(bus.offset, bus.id);

            // Set Static Modal info
            document.getElementById('modalBusName').innerText = bus.name;
            document.getElementById('modalGlow').className = `absolute -top-20 -right-20 w-40 h-40 rounded-full blur-3xl opacity-20 ${bus.color}`;
            
            const modalIconBg = document.getElementById('modalBusIcon');
            modalIconBg.className = `w-20 h-20 rounded-2xl flex items-center justify-center mb-4 ${bus.color} ${bus.glow}`;
            
            const modalStatusText = document.getElementById('modalBusStatus');
            modalStatusText.innerText = data.isParked ? 'خارج الخدمة' : 'في الخدمة';
            modalStatusText.className = `px-3 py-1 rounded-full text-xs font-bold border border-slate-700 bg-slate-800/50 ${bus.text}`;

            document.getElementById('modalProgressBar').className = `h-3 rounded-full transition-all duration-300 ease-linear ${bus.color}`;

            // Show modal
            const modal = document.getElementById('busModal');
            modal.classList.remove('hidden');
            
            updateUI(); // immediate update
        }

        function closeModal() {
            state.selectedBusId = null;
            document.getElementById('busModal').classList.add('hidden');
        }

        // Initialize application
        window.onload = initDOM;

    </script>
