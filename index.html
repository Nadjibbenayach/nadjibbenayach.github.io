<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Bus Tracker</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Remove default margins so the map fills the whole window */
        body { margin: 0; padding: 0; }
        #map { width: 100vw; height: 100vh; } 
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // --- MAP SETUP ---
        // Initialize the map and set the starting view (Latitude, Longitude, and Zoom Level)
        // I've centered this near Algiers for our example!
        const map = L.map('map').setView([36.7538, 3.0588], 14);

        // Add the street map imagery from OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // --- BUS MARKER SETUP ---
        // Define the starting coordinates for our bus
        let busCoordinates = [36.7538, 3.0588];
        
        // Add a marker to the map at those coordinates
        const busMarker = L.marker(busCoordinates).addTo(map)
            .bindPopup('<b>Bus 42</b><br>On route.')
            .openPopup();

        // --- REAL-TIME SIMULATION ---
        // The setInterval function runs code repeatedly on a timer (every 2000 milliseconds = 2 seconds)
        setInterval(() => {
            // 1. Simulate the bus moving by changing its coordinates slightly
            busCoordinates[0] += 0.0002; // Move North
            busCoordinates[1] += 0.0003; // Move East

            // 2. Tell the map marker to update its position to the new coordinates
            busMarker.setLatLng(busCoordinates);

            // Optional: Tell the map to follow the bus as it moves
            map.panTo(busCoordinates);

            console.log("Bus moved to:", busCoordinates);
        }, 2000); 
    </script>
</body>
</html>
