<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Tracker Pro - المرقاب الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .bus-element { transition: left 0.1s linear, top 0.1s linear, transform 0.3s ease-out; }
        .pulse-glow { animation: pulseGlow 2s infinite; }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(56, 189, 248, 0); }
            100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); }
        }
    </style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 font-sans pb-10">

    <!-- إشعار الإدارة (يظهر للجميع عند التوقف) -->
    <div id="adminToast" class="fixed top-20 left-4 right-4 z-[120] bg-amber-600/90 text-white p-4 rounded-2xl shadow-2xl border border-amber-400 hidden animate-bounce">
        <div class="flex items-center gap-3">
            <i data-lucide="alert-triangle"></i>
            <p id="toastMessage" class="text-sm font-bold"></p>
        </div>
    </div>

    <!-- ... (بقية واجهة الموقع كما هي) ... -->
    <!-- (ملاحظة: تأكد من إبقاء الأجزاء السابقة كما هي، التغيير الأساسي في السكريبت أدناه) -->

    <script type="module">
        // ... (نفس إعدادات Firebase والـ imports السابقة) ...

        // المنطق المحدث للحافلات
        window.getBusData = function(bus) {
            const currentMinutes = state.simulatedTime.getHours() * 60 + state.simulatedTime.getMinutes() + state.simulatedTime.getSeconds() / 60;
            
            // تحقق من الحافلة الثانية
            const bus2 = BUSES.find(b => b.id === 2);
            let dynamicOffset = bus.offset;

            // إذا الحافلة 2 متوقفة والحافلة الحالية هي 1، نضيف تأخير 15 دقيقة
            if (bus.id === 1 && bus2 && bus2.isPaused) {
                // التأكد من عدم التأثير على موعد الانطلاق (أول دورة)
                const elapsedSinceStart = currentMinutes - START_TIME_MINUTES;
                if (elapsedSinceStart > 10) { 
                    dynamicOffset += 15;
                }
            }

            const diff = currentMinutes - START_TIME_MINUTES - dynamicOffset;
            
            // ... (بقية حسابات الموقع كما كانت في الكود السابق) ...
        }

        // دالة إرسال التنبيه للسحابة
        window.triggerAdminToast = function(message) {
            const docRef = doc(db, 'projects', appId, 'settings', 'toast');
            setDoc(docRef, { message: message, timestamp: Date.now() });
        }

        // الاستماع للتنبيهات (ليراها الجميع)
        onSnapshot(doc(db, 'projects', appId, 'settings', 'toast'), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                if (Date.now() - data.timestamp < 30000) { // يظهر إذا كان التنبيه أحدث من 30 ثانية
                    const toast = document.getElementById('adminToast');
                    document.getElementById('toastMessage').innerText = data.message;
                    toast.classList.remove('hidden');
                    setTimeout(() => toast.classList.add('hidden'), 15000); // يختفي بعد 15 ثانية
                }
            }
        });

        // تعديل دالة الإيقاف في لوحة الإدارة
        window.toggleAdminPause = function(index) {
            const isPausedBefore = tempBuses[index].isPaused;
            tempBuses[index].isPaused = !isPausedBefore;
            
            if (!isPausedBefore && tempBuses[index].id === 2) {
                window.triggerAdminToast("تنبيه: الحافلة 2 متوقفة مؤقتاً، تأخير 15 دقيقة للحافلة 1.");
            }
            renderAdminBuses();
        }

        // ... (بقية الدوال كما هي في النسخة المصححة السابقة) ...
    </script>
</body>
</html>
