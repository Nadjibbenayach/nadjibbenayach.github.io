<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Tracker Pro - المرقاب الذكي</title>
    
    <!-- PWA Setup -->
    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#020617">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        .bus-element { transition: left 0.1s linear, top 0.1s linear, transform 0.3s ease-out; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        body.light-mode { background-color: #f1f5f9; color: #0f172a; }
        body.light-mode .bg-slate-950, body.light-mode .bg-slate-900 { background-color: #ffffff !important; }
        body.light-mode .bg-slate-800 { background-color: #f8fafc !important; }
        body.light-mode .text-slate-100, body.light-mode .text-white { color: #0f172a !important; }
        body.light-mode .text-slate-300, body.light-mode .text-slate-400 { color: #475569 !important; }
    </style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 font-sans pb-10 transition-colors duration-500">

    <div id="adminToast" class="fixed top-20 left-4 right-4 z-[120] bg-amber-600/90 text-white p-4 rounded-2xl shadow-2xl hidden animate-bounce backdrop-blur-md">
        <p id="toastMessage" class="text-sm font-bold"></p>
    </div>

    <!-- === شريط التنقل === -->
    <div class="sticky top-0 z-40 bg-slate-950/80 backdrop-blur-xl border-b border-slate-800 px-4 py-3 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center shadow-lg">
                <i data-lucide="bus-front" class="text-slate-950 w-6 h-6"></i>
            </div>
            <div>
                <h1 class="text-lg font-black text-white leading-tight">مرقاب جيجل</h1>
                <p class="text-[10px] text-emerald-400 font-mono" id="mainClock">00:00:00</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="window.toggleTheme()" class="p-2 bg-slate-800 text-amber-400 rounded-xl">
                <i data-lucide="sun" id="themeIcon" class="w-4 h-4"></i>
            </button>
            <div id="syncIndicator" class="hidden items-center gap-1 text-[9px] px-2 py-1 rounded-full bg-blue-500/20 text-blue-400 border border-blue-500/30">
                متصل ☁️
            </div>
            <button onclick="window.initiateAdminAccess()" class="p-2 bg-slate-800 text-slate-300 rounded-xl">
                <i data-lucide="settings" class="w-4 h-4"></i>
            </button>
        </div>
    </div>

    <!-- === المحتوى === -->
    <div class="p-4 max-w-md mx-auto">
        <div class="bg-slate-900/50 backdrop-blur-xl border border-slate-800 rounded-3xl p-5 shadow-2xl mb-6">
            <h2 class="text-sm font-bold text-slate-300 mb-4 flex items-center gap-2">حالة الأسطول (مباشر)</h2>
            <div id="busListContainer" class="flex flex-col gap-3"></div>
        </div>
    </div>

    <!-- نافذة تسجيل الدخول -->
    <div id="authModal" class="fixed inset-0 z-[110] flex items-center justify-center p-4 bg-black/80 backdrop-blur-md hidden" onclick="window.closeAuth()">
        <div class="bg-slate-900 border border-slate-700 rounded-3xl p-6 w-full max-w-xs" onclick="event.stopPropagation()">
            <h2 class="text-lg font-bold text-center text-white mb-6">دخول الإدارة</h2>
            <div class="space-y-3">
                <input type="text" id="adminUser" placeholder="Username" class="w-full bg-slate-800 rounded-xl p-3 text-sm text-white" dir="ltr">
                <input type="password" id="adminPass" placeholder="Password" class="w-full bg-slate-800 rounded-xl p-3 text-sm text-white" dir="ltr">
            </div>
            <p id="authError" class="text-red-400 text-xs text-center mt-2 hidden">بيانات خاطئة!</p>
            <button onclick="window.checkAuth()" class="w-full py-3 mt-4 bg-emerald-600 text-white rounded-xl text-sm font-bold">دخول</button>
        </div>
    </div>

    <!-- نافذة الإدارة -->
    <div id="adminModal" class="fixed inset-0 z-[100] bg-black/80 hidden p-4 flex items-start justify-center pt-10" onclick="window.closeAdminPanel()">
        <div class="bg-slate-900 p-6 rounded-3xl w-full max-w-md max-h-[85vh] overflow-y-auto" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-emerald-400">الإعدادات والسحابة</h2>
                <button onclick="window.closeAdminPanel()" class="p-2 bg-slate-800 rounded-full"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div>
                    <label class="block text-xs text-slate-400 mb-1">وقت البدء</label>
                    <input type="time" id="adminStartTime" class="w-full bg-slate-800 rounded-lg p-2 text-sm text-white" dir="ltr">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">وقت التوقف</label>
                    <input type="time" id="adminEndTime" class="w-full bg-slate-800 rounded-lg p-2 text-sm text-white" dir="ltr">
                </div>
            </div>

            <div id="adminBusesList" class="space-y-3 mb-6"></div>

            <button id="mainSaveBtn" onclick="window.saveAdminConfig()" class="w-full py-4 bg-emerald-600 text-white rounded-xl font-bold text-lg shadow-lg">
                نشر التعديلات للجميع ☁️
            </button>
        </div>
    </div>

    <!-- السكريبت المنطقي + Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyAWg5d4zkUkN5ZsUiVHs9hiOBs_hmRwy_k",
            authDomain: "bustruker-9f717.firebaseapp.com",
            projectId: "bustruker-9f717",
            storageBucket: "bustruker-9f717.firebasestorage.app",
            messagingSenderId: "543529041667",
            appId: "1:543529041667:web:0063318912541a2bab3336"
        };

        // المتغيرات العامة
        window.START_TIME_MINUTES = 6 * 60 + 30; 
        window.END_TIME_MINUTES = 19 * 60; 
        window.CYCLE_DURATION = 90;
        window.BUSES = [
            { id: 1, name: 'حافلة 1', offset: 0, isPaused: false, capacity: 1 },
            { id: 2, name: 'حافلة 2', offset: 30, isPaused: false, capacity: 1 },
            { id: 3, name: 'حافلة 3', offset: 60, isPaused: false, capacity: 1 }
        ];

        let tempBuses = [];
        window.db = null;
        window.isCloudEnabled = false;

        // دوال مساعدة
        function timeToMinutes(t) { if(!t)return 0; const [h,m]=t.split(':').map(Number); return h*60+m; }
        function minutesToTime(m) { return `${Math.floor(m/60).toString().padStart(2,'0')}:${(m%60).toString().padStart(2,'0')}`; }

        // الواجهة الأمامية
        window.updateUI = function() {
            document.getElementById('mainClock').innerText = new Date().toLocaleTimeString('ar-SA');
            const container = document.getElementById('busListContainer');
            container.innerHTML = window.BUSES.map(b => `
                <div class="bg-slate-800/50 p-4 rounded-xl flex justify-between items-center border border-slate-700">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full flex items-center justify-center ${b.isPaused ? 'bg-red-500/20 text-red-500' : 'bg-emerald-500/20 text-emerald-500'}">
                            <i data-lucide="bus" class="w-4 h-4"></i>
                        </div>
                        <div>
                            <p class="font-bold text-sm text-slate-200">${b.name}</p>
                            <p class="text-[10px] text-slate-400">${b.capacity === 3 ? 'ممتلئة 🔴' : b.capacity === 2 ? 'متوسطة 🟡' : 'فارغة 🟢'}</p>
                        </div>
                    </div>
                    <span class="text-xs font-bold px-3 py-1 rounded-full ${b.isPaused ? 'bg-red-500/20 text-red-400' : 'bg-emerald-500/20 text-emerald-400'}">
                        ${b.isPaused ? 'متوقفة مؤقتاً' : 'في الخدمة'}
                    </span>
                </div>
            `).join('');
            lucide.createIcons();
        }

        setInterval(window.updateUI, 1000);

        // الإدارة
        window.initiateAdminAccess = function() { document.getElementById('authModal').classList.remove('hidden'); }
        window.closeAuth = function() { document.getElementById('authModal').classList.add('hidden'); }
        window.checkAuth = function() {
            const user = document.getElementById('adminUser').value; const pass = document.getElementById('adminPass').value;
            if (user === 'nadjibbenayache' && pass === 'nadjibkaous') { window.closeAuth(); window.openAdminPanel(); } 
            else document.getElementById('authError').classList.remove('hidden');
        }

        window.openAdminPanel = function() {
            document.getElementById('adminStartTime').value = minutesToTime(window.START_TIME_MINUTES);
            document.getElementById('adminEndTime').value = minutesToTime(window.END_TIME_MINUTES);
            tempBuses = JSON.parse(JSON.stringify(window.BUSES)); 
            window.renderAdminBuses();
            document.getElementById('adminModal').classList.remove('hidden');
        }
        window.closeAdminPanel = function() { document.getElementById('adminModal').classList.add('hidden'); }

        window.renderAdminBuses = function() {
            document.getElementById('adminBusesList').innerHTML = tempBuses.map((bus, i) => `
                <div class="flex flex-col gap-2 bg-slate-800 p-3 rounded-xl border ${bus.isPaused ? 'border-red-500/50' : 'border-slate-700'}">
                    <div class="flex items-center gap-2">
                        <input type="text" value="${bus.name}" onchange="tempBuses[${i}].name=this.value" class="flex-1 bg-slate-900 rounded p-2 text-xs text-white">
                        <select onchange="tempBuses[${i}].capacity=parseInt(this.value)" class="bg-slate-900 rounded p-2 text-xs text-white outline-none">
                            <option value="1" ${bus.capacity===1?'selected':''}>🟢 فارغة</option>
                            <option value="2" ${bus.capacity===2?'selected':''}>🟡 متوسطة</option>
                            <option value="3" ${bus.capacity===3?'selected':''}>🔴 ممتلئة</option>
                        </select>
                    </div>
                    <button onclick="tempBuses[${i}].isPaused = !tempBuses[${i}].isPaused; window.renderAdminBuses();" class="w-full py-2 rounded text-xs font-bold ${bus.isPaused ? 'bg-red-600 text-white' : 'bg-slate-700 text-slate-300'}">
                        ${bus.isPaused ? 'إستئناف العمل ▶️' : 'إيقاف الحافلة ⏸️'}
                    </button>
                </div>
            `).join('');
        }

        // الحفظ والنشر للسحابة (الآن صارم جداً)
        window.saveAdminConfig = async function() {
            const btn = document.getElementById('mainSaveBtn');
            
            // فحص الاتصال أولاً
            if (!window.isCloudEnabled || !window.db) {
                alert("❌ فشل النشر: السحابة غير متصلة! يرجى تحديث الصفحة أو فحص الإنترنت.");
                return;
            }

            btn.innerText = "جاري النشر للسحابة... ⏳";
            
            try {
                const start = timeToMinutes(document.getElementById('adminStartTime').value);
                const end = timeToMinutes(document.getElementById('adminEndTime').value);
                const newBuses = JSON.parse(JSON.stringify(tempBuses));

                // المسار الدقيق في Firebase
                const configRef = doc(window.db, 'projects', 'bustruker-9f717', 'settings', 'config');
                const toastRef = doc(window.db, 'projects', 'bustruker-9f717', 'settings', 'toast');

                // 1. إرسال البيانات للسحابة (إجباري)
                await setDoc(configRef, {
                    START_TIME_MINUTES: start,
                    END_TIME_MINUTES: end,
                    CYCLE_DURATION: window.CYCLE_DURATION,
                    BUSES: newBuses
                });

                // 2. إرسال إشعار في حال توقف الحافلة 2
                if(newBuses[1] && newBuses[1].isPaused) {
                    await setDoc(toastRef, { message: "تنبيه هام: الحافلة 2 متوقفة مؤقتاً! ⚠️", timestamp: Date.now() });
                }

                // 3. تحديث الذاكرة المحلية فقط إذا نجح النشر السحابي
                window.START_TIME_MINUTES = start; window.END_TIME_MINUTES = end; window.BUSES = newBuses;
                
                alert("✅ تم النشر بنجاح لجميع المستخدمين!");
                window.closeAdminPanel();
                window.updateUI();

            } catch (error) {
                // سيظهر لك سبب المشكلة هنا بالضبط
                alert("❌ حدث خطأ يمنع النشر للسحابة:\n" + error.message);
            } finally {
                btn.innerText = "نشر التعديلات للجميع ☁️";
            }
        };

        // الثيم
        window.toggleTheme = function() {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
            lucide.createIcons();
        };

        if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');

        // تشغيل Firebase بصرامة
        try {
            const app = initializeApp(firebaseConfig);
            window.db = getFirestore(app);
            window.isCloudEnabled = true;

            const configRef = doc(window.db, 'projects', 'bustruker-9f717', 'settings', 'config');
            const toastRef = doc(window.db, 'projects', 'bustruker-9f717', 'settings', 'toast');

            // مراقب التحديثات اللحظية
            onSnapshot(configRef, (docSnap) => {
                if (docSnap.exists()) {
                    document.getElementById('syncIndicator').classList.remove('hidden');
                    document.getElementById('syncIndicator').classList.add('flex');
                    
                    const data = docSnap.data();
                    window.START_TIME_MINUTES = data.START_TIME_MINUTES;
                    window.END_TIME_MINUTES = data.END_TIME_MINUTES;
                    window.BUSES = data.BUSES;
                    window.updateUI();
                } else {
                    console.log("قاعدة البيانات فارغة، سيتم إنشاؤها عند أول حفظ.");
                }
            }, (error) => {
                alert("❌ خطأ في استقبال البيانات من السحابة:\n" + error.message);
            });

            // مراقب الإشعارات
            onSnapshot(toastRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (Date.now() - data.timestamp < 20000) {
                        const toast = document.getElementById('adminToast');
                        document.getElementById('toastMessage').innerText = data.message;
                        toast.classList.remove('hidden');
                        setTimeout(() => toast.classList.add('hidden'), 15000);
                    }
                }
            });

        } catch(error) {
            alert("❌ فشل الاتصال الأولي بخوادم Firebase:\n" + error.message);
        }
        
        window.updateUI();
    </script>
</body>
</html>
