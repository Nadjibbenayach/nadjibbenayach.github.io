<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Tracker Pro - المرقاب الذكي</title>
    <!-- PWA -->
    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#020617">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        .bus-element { transition: left 0.1s linear, top 0.1s linear, transform 0.3s ease-out; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        body.light-mode { background-color: #f1f5f9; color: #0f172a; }
        body.light-mode .bg-slate-950, body.light-mode .bg-slate-900 { background-color: #ffffff !important; }
        body.light-mode .bg-slate-800 { background-color: #f8fafc !important; }
    </style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 font-sans pb-10 transition-colors duration-500">

    <div id="adminToast" class="fixed top-20 left-4 right-4 z-[120] bg-amber-600/90 text-white p-4 rounded-2xl shadow-2xl hidden animate-bounce">
        <p id="toastMessage" class="text-sm font-bold"></p>
    </div>

    <!-- المحتوى -->
    <div class="p-4 max-w-md mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold">مرقاب جيجل</h1>
            <div id="syncIndicator" class="hidden text-[9px] bg-blue-500/20 text-blue-400 px-2 py-1 rounded-full border border-blue-500/30">متصل بالسحابة ☁️</div>
        </div>
        
        <div id="busListContainer" class="flex flex-col gap-3"></div>
        <button onclick="window.initiateAdminAccess()" class="w-full py-4 mt-6 bg-slate-800 rounded-2xl text-sm font-bold">لوحة التحكم</button>
    </div>

    <!-- نافذة الإدارة -->
    <div id="adminModal" class="fixed inset-0 z-[100] bg-black/80 hidden p-4" onclick="window.closeAdminPanel()">
        <div class="bg-slate-900 p-6 rounded-3xl w-full max-w-md" onclick="event.stopPropagation()">
            <h2 class="text-xl font-bold text-emerald-400 mb-4">الإعدادات</h2>
            <div id="adminBusesList" class="space-y-3 mb-6"></div>
            <button id="mainSaveBtn" onclick="window.saveAdminConfig()" class="w-full py-3 bg-emerald-600 rounded-xl font-bold">حفظ ونشر التعديلات</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // إعداد Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAWg5d4zkUkN5ZsUiVHs9hiOBs_hmRwy_k",
            authDomain: "bustruker-9f717.firebaseapp.com",
            projectId: "bustruker-9f717",
            storageBucket: "bustruker-9f717.firebasestorage.app",
            messagingSenderId: "543529041667",
            appId: "1:543529041667:web:0063318912541a2bab3336"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // المسار الصحيح بناءً على صورتك (config -> main_config)
        const configRef = doc(db, 'config', 'main_config');
        const toastRef = doc(db, 'config', 'toast');

        window.BUSES = [
            { id: 1, name: 'حافلة 1', offset: 0, isPaused: false, capacity: 1 },
            { id: 2, name: 'حافلة 2', offset: 30, isPaused: false, capacity: 1 }
        ];

        // الاستماع للتحديثات
        onSnapshot(configRef, (docSnap) => {
            if (docSnap.exists()) {
                window.BUSES = docSnap.data().BUSES;
                document.getElementById('syncIndicator').classList.remove('hidden');
                document.getElementById('syncIndicator').classList.add('flex');
                renderBuses();
            }
        });

        onSnapshot(toastRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                if (Date.now() - data.timestamp < 30000) {
                    const toast = document.getElementById('adminToast');
                    document.getElementById('toastMessage').innerText = data.message;
                    toast.classList.remove('hidden');
                    setTimeout(() => toast.classList.add('hidden'), 5000);
                }
            }
        });

        function renderBuses() {
            const container = document.getElementById('busListContainer');
            container.innerHTML = window.BUSES.map(b => `
                <div class="bg-slate-800 p-4 rounded-2xl flex justify-between">
                    <span>${b.name}</span>
                    <span class="${b.isPaused ? 'text-red-500' : 'text-emerald-500'} font-bold">
                        ${b.isPaused ? 'متوقفة' : 'تعمل'}
                    </span>
                </div>
            `).join('');
        }

        window.saveAdminConfig = async function() {
            try {
                await setDoc(configRef, { BUSES: window.BUSES });
                alert("تم الحفظ والنشر لجميع المسافرين!");
            } catch(e) { alert("خطأ: " + e.message); }
        };

        window.initiateAdminAccess = function() { document.getElementById('adminModal').classList.remove('hidden'); };
        window.closeAdminPanel = function() { document.getElementById('adminModal').classList.add('hidden'); };
        
        renderBuses();
    </script>
</body>
</html>
